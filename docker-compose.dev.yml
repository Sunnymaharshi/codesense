# Development overrides — use with:
# docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - uv_cache:/root/.cache/uv
      - fastembed_cache:/root/.cache/fastembed
    environment:
      - PYTHONUNBUFFERED=1
      - VIRTUAL_ENV=/venv
      - PYTHONPATH=/app
    command: /venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - uv_cache:/root/.cache/uv
      - fastembed_cache:/root/.cache/fastembed
    environment:
      - PYTHONUNBUFFERED=1
      - VIRTUAL_ENV=/venv
      - PYTHONPATH=/app
    command: /venv/bin/celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

volumes:
  uv_cache:
  fastembed_cache:
